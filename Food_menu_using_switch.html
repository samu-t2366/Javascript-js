<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Food Menu Using switch</h1>
<script>
    var choice = parseInt(prompt(
"1. Pizza\n2. Burger\n3. Sandwich\n4. Coffee"));

switch(choice){
case 1: alert("Pizza Selected"); break;
case 2: alert("Burger Selected"); break;
case 3: alert("Sandwich Selected"); break;
case 4: alert("Coffee Selected"); break;
default: alert("Invalid Choice");
}

</script>    
</body>
</html>
