<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#fafafa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
}

.login-box{
    background:#fff;
    border:1px solid #dbdbdb;
    padding:40px;
    text-align:center;
}

.logo{
    font-family:'Brush Script MT', cursive;
    font-size:50px;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border:1px solid #dbdbdb;
    border-radius:4px;
    background:#fafafa;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#0095f6;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#0077cc;
}

.or{
    display:flex;
    align-items:center;
    margin:20px 0;
    color:#8e8e8e;
    font-size:13px;
}

.or::before,
.or::after{
    content:"";
    flex:1;
    height:1px;
    background:#dbdbdb;
}

.or span{
    margin:0 10px;
}

.fb-login{
    color:#385185;
    font-weight:bold;
    text-decoration:none;
    display:block;
    margin-bottom:15px;
}

.forgot{
    text-decoration:none;
    color:#00376b;
    font-size:12px;
}

.signup-box{
    background:#fff;
    border:1px solid #dbdbdb;
    text-align:center;
    padding:20px;
    margin-top:10px;
}

.signup-box a{
    text-decoration:none;
    color:#0095f6;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
    <div class="login-box">
        <div class="logo">Instagram</div>

        <input type="text" placeholder="Phone number, username, or email">
        <input type="password" placeholder="Password">

        <button>Log In</button>

        <div class="or">
            <span>OR</span>
        </div>

        <a href="#" class="fb-login">Log in with Facebook</a>
        <a href="#" class="forgot">Forgot password?</a>
    </div>

    <div class="signup-box">
        Don't have an account?
        <a href="#">Sign up</a>
    </div>
</div>

</body>
</html>
