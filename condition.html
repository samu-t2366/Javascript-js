<body>
    <h1>Else if ladder</h1>
<script>
    var amount=Number(prompt("Enter teh amount"));
    var bill
    if(amount>5000)
{
    bill=amount*(20/100)
    console.log(bill);
    
    
}else if(amount>3000)
{
    bill=amount*(10/100)
    console.log(bill);
    
}else if(amount>1000)
{
    bill=amount*(5/100)
    console.log(bill);
    
}
else{
    console.log("No Discount");
    
}
</script>    
</body>
</html>
