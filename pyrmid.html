<!DOCTYPE html>
<html>
<head>
    <title>Left Half Pyramid</title>
</head>
<body>

<pre id="output"></pre>

<script>
var n = 6;
var pattern = "";

for(var i = 1; i <= n; i++) {
    for(var j = 1; j <= n - i; j++) {
        pattern += " ";
    }

    for(var k = 1; k <= i; k++) {
        pattern += "*";
    }

    pattern += "\n";
}

document.getElementById("output").textContent = pattern;
</script>

</body>
</html>
