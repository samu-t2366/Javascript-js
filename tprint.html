<!DOCTYPE html>
<html>
<head>
    <title>T Pattern</title>
</head>
<body>

<script>
for (let i = 1; i <= 6; i++) {
    for (let j = 1; j <= 7; j++) {

        if (i == 1 || j == 4)
            document.write("*");
        else
            document.write("&nbsp;&nbsp;");
    }
    document.write("<br>");
}
</script>

</body>
</html>
