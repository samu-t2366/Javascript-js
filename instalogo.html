<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Logo</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#f5f5f5;
    }

    .instagram-logo{
        width:200px;
        height:200px;
        border-radius:50px;
        position:relative;
        background:linear-gradient(
            45deg,
            #feda75,
            #fa7e1e,
            #d62976,
            #962fbf,
            #4f5bd5
        );
    }

    .instagram-logo::before{
        content:"";
        position:absolute;
        top:20px;
        left:20px;
        right:20px;
        bottom:20px;
        border:12px solid #fff;
        border-radius:40px;
    }

    .inner-circle{
        position:absolute;
        width:70px;
        height:70px;
        border:12px solid #fff;
        border-radius:50%;
        top:50%;
        left:50%;
        transform:translate(-50%, -50%);
    }

    .small-circle{
        position:absolute;
        width:18px;
        height:18px;
        background:#fff;
        border-radius:50%;
        top:45px;
        right:45px;
    }
</style>
</head>

<body>
    <div class="instagram-logo">
        <div class="inner-circle"></div>
        <div class="small-circle"></div>
    </div>
</body>
</html>
