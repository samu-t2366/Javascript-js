<!DOCTYPE html>
<html>
<head>
<title>Amazon Makeup Store</title>
<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f1f1f1;
}
header{
    background:#131921;
    color:white;
    text-align:center;
    padding:15px;
}
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}
.card{
    background:white;
    width:250px;
    padding:15px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px gray;
}
.card img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
}
button{
    background:orange;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>
<body>

<header>
    <h1>Amazon Makeup Store</h1>
</header>

<div class="container">

    <div class="card">
        <img src="lipstick.webp" alt="Lipstick">
        <h3>Lipstick</h3>
        <p>₹299</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="download.webp" alt="Foundation">
        <h3>Foundation</h3>
        <p>₹599*3</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="OIP.webp" alt="Compact Powder">
        <h3>Compact Powder</h3>
        <p>₹399</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="OIP (1).webp" alt="Mascara">
        <h3>Mascara</h3>
        <p>₹499</p>
        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
