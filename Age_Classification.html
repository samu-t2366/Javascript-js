<body>
    <h1>Age Classification</h1>
<script>
    var age=parseInt(prompt("Enter Age"));
    if(age <=12)
    alert("Child");
else if(age <=19)
    alert("Teen");
else if(age <=59)
    alert("Adult");
else
    alert("senior");  
</script>    
</body>
