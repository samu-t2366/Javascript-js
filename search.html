    #searchBar {

      font-size: 16px;
    }

    #productContainer {

      flex-wrap: wrap;
      gap: 15px;
    }

      padding: 15px;
      border-radius: 8px;
      width: 220px;
      background: #d86da2;
    }

    .product img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 10px;
    }

      margin-top: 10px;
      padding: 6px 10px;
      cursor: pointer;
      background: #2196f3;
      color: #fff;
      border: none;
      border-radius: 4px;

        function display(list)
        {
            container.innerHTML="";
            

            list.forEach((product)=> {
                let div=document.createElement("div")
                div.className="product";
                div.innerHTML=`
                <img src="${product.img}" alt=""   />
                <h3>${product.pname}</h3>
                <p>${product.cname}</p>
                <p><strong>${product.price}</strong></p>
                <button onclick="">Buy Now</button> `        
               ;
               container.appendChild(div);
        });
    }
        search.addEventListener("input",()=>
        {
            let searchval=search.value.toLowerCase();
            let filtered=product.filter((pr)=>
            {
                return pr.pname.toLowerCase().includes(searchval)
            
        });
        display(filtered)
    });
    document.getElementById("lowHighBtn").addEventListener("click", ()=>
    {
        let sortedProducts=[...product];
        sortedProducts.sort((a,b)=>a.price-b.price);
        display(sortedProducts);
    });
    document.getElementById("HighLowBtn").addEventListener("click", ()=>
    {
        let sortedProducts=[...product];
        sortedProducts.sort((a,b)=>b.price-a.price);
        display(sortedProducts);
    });
    display(product);
