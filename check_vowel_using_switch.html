<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <h1>Check vowel using switch</h1>
<script>
    var ch = prompt("Enter Character");

switch(ch){
case 'a':
case 'e':
case 'i':
case 'o':
case 'u':
case 'A':
case 'E':
case 'I':
case 'O':
case 'U':
alert("Vowel");
break;

default:
alert("Consonant");
}

</script>   
   
</body>
</html>
